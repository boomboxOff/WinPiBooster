name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Tidy check
        shell: cmd
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        shell: cmd
        run: go vet .

      - name: staticcheck
        shell: cmd
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck .

      - name: Test with race detector and coverage
        shell: cmd
        run: go test -race -count=1 -timeout 120s -coverprofile=coverage.out .

      - name: Coverage report
        shell: cmd
        run: go tool cover -func=coverage.out

      - name: Coverage threshold (40%)
        shell: pwsh
        run: |
          $report = & go tool cover "-func=coverage.out"
          $line   = $report | Select-String "^total:"
          $pct    = [double]($line -replace ".*\s+([\d.]+)%.*", '$1')
          Write-Host "Total coverage: $pct%"
          if ($pct -lt 40.0) {
            Write-Error "Coverage $pct% is below minimum threshold of 40%"
            exit 1
          }

      - name: Build
        shell: cmd
        run: go build -ldflags="-s -w -X main.version=dev" -o WinPiBooster.exe .
