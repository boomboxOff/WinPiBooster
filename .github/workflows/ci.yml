name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test with race detector
        run: go test -race -count=1 -timeout 120s ./...

      - name: Test with coverage
        run: go test -count=1 -timeout 120s -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Coverage threshold (30%)
        shell: pwsh
        run: |
          $line = go tool cover -func=coverage.out | Select-String "^total:"
          $pct  = [double]($line -replace ".*\s+([\d.]+)%.*", '$1')
          Write-Host "Total coverage: $pct%"
          if ($pct -lt 30.0) {
            Write-Error "Coverage $pct% is below minimum threshold of 30%"
            exit 1
          }

      - name: Build
        run: go build -ldflags="-s -w -X main.version=dev" -o WinPiBooster.exe .
